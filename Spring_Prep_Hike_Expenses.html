<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Prep Hike — Food Expense Report</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --earth: #3B2F2F;
      --bark: #5C4033;
      --stone: #8C7B6B;
      --cream: #F5F0E8;
      --parchment: #EDE5D4;
      --gold: #C8A456;
      --fern: #4A6741;
      --sky: #1F4E79;
      --dusk: #8B6B8B;
      --rust: #8C4A2F;
      --green: #EDF5E8;
      --blue: #E8F0F5;
      --amber: #FFF8ED;
      --red: #FFF0EE;
    }

    body {
      background: var(--cream);
      color: var(--earth);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      padding: 2rem 1rem 4rem
    }

    .page {
      max-width: 860px;
      margin: 0 auto
    }

    /* Header */
    .header {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 2rem
    }

    .header::before {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 1.2rem
    }

    .report-label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: .5rem
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--earth);
      margin-bottom: .3rem
    }

    .meta {
      font-size: .8rem;
      color: var(--stone);
      margin-bottom: 1.2rem
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: .75rem;
      margin-bottom: 2rem
    }

    .card {
      background: #fff;
      border: 1px solid #D0C8BC;
      border-radius: 6px;
      padding: .85rem 1rem;
      text-align: center
    }

    .card-label {
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: .3rem
    }

    .card-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--earth);
      font-family: 'Playfair Display', serif
    }

    .card-value.big {
      font-size: 1.6rem;
      color: var(--fern)
    }

    .card-sub {
      font-size: .68rem;
      color: var(--stone);
      margin-top: .2rem
    }

    /* Category badges */
    .badge {
      display: inline-block;
      font-size: .62rem;
      font-weight: 600;
      padding: .15rem .55rem;
      border-radius: 3px;
      letter-spacing: .05em;
      text-transform: uppercase;
      vertical-align: middle
    }

    .badge-meals {
      background: #E8F5E8;
      color: #2A6A2A
    }

    .badge-snacks {
      background: #FFF3CD;
      color: #7B3F00
    }

    .badge-drinks {
      background: #E8F0F5;
      color: var(--sky)
    }

    .badge-allergy {
      background: #FFF0EE;
      color: #8C2A2A
    }

    .badge-jerky {
      background: #F5EDD8;
      color: var(--bark)
    }

    .badge-gear {
      background: #EDE8D8;
      color: #5C4033
    }

    .badge-campsite {
      background: #E8F5ED;
      color: var(--fern)
    }

    .badge-fuel {
      background: #FFF3CD;
      color: #7B5000
    }

    /* Receipt sections */
    .receipt {
      margin-bottom: 2rem;
      border: 1px solid #D0C8BC;
      border-radius: 6px;
      overflow: hidden
    }

    .receipt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
      padding: .85rem 1.1rem;
      border-bottom: 2px solid var(--gold)
    }

    .receipt-header.sprouts {
      background: #F0F8F0
    }

    .receipt-header.walmart {
      background: #F0F5FF
    }

    .receipt-header.sbasement {
      background: #FFF8F0
    }

    .receipt-header.peak {
      background: #FFF5E8
    }

    .receipt-header.amazon {
      background: #F5F8FF
    }

    .receipt-header.costco {
      background: #EEF3FA
    }

    .receipt-header.rei {
      background: #F5EDE8
    }

    .receipt-header.reserveamerica {
      background: #EDF5ED
    }

    .receipt-header.chevron {
      background: #FFF9EC
    }

    .store-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--earth)
    }

    .store-meta {
      font-size: .7rem;
      color: var(--stone);
      margin-top: .15rem
    }

    .receipt-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--fern);
      font-family: 'Playfair Display', serif;
      white-space: nowrap
    }

    /* Item table */
    table {
      width: 100%;
      border-collapse: collapse
    }

    thead tr {
      background: var(--parchment)
    }

    th {
      padding: 6px 12px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--stone);
      text-align: left;
      border-bottom: 1px solid #D0C8BC
    }

    th.r {
      text-align: right
    }

    tbody tr {
      border-bottom: 1px solid #EEE8E0
    }

    tbody tr:last-child {
      border-bottom: none
    }

    tbody tr:nth-child(even) {
      background: #FAFAF7
    }

    td {
      padding: 8px 12px;
      font-size: .78rem;
      color: var(--earth);
      vertical-align: top
    }

    td.r {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--sky);
      font-weight: 500
    }

    td.note {
      font-size: .7rem;
      color: var(--stone);
      font-style: italic
    }

    td.item-name {
      font-weight: 400
    }

    .qty {
      display: inline-block;
      background: var(--parchment);
      border-radius: 3px;
      padding: .1rem .4rem;
      font-size: .7rem;
      color: var(--stone);
      margin-right: .3rem;
      font-weight: 500
    }

    /* Totals footer */
    .receipt-footer {
      background: var(--parchment);
      border-top: 1px solid #D0C8BC
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 12px;
      font-size: .76rem;
      color: var(--stone)
    }

    .footer-row.subtotal {
      font-weight: 500;
      color: var(--earth)
    }

    .footer-row.discount {
      color: var(--fern)
    }

    .footer-row.fees {
      color: var(--stone)
    }

    .footer-row.grand {
      font-weight: 700;
      font-size: .88rem;
      color: var(--earth);
      padding: 8px 12px;
      background: #EDE5D4;
      border-top: 1px solid #C8A456
    }

    .footer-row.grand span:last-child {
      color: var(--fern);
      font-family: 'Playfair Display', serif;
      font-size: 1rem
    }

    /* Note row */
    .receipt-note {
      background: #FFFBF5;
      padding: 7px 12px;
      font-size: .71rem;
      color: var(--stone);
      border-top: 1px solid #EEE8E0;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: .4rem
    }

    .receipt-note::before {
      content: 'ℹ';
      font-style: normal;
      opacity: .6
    }

    /* Grand total block */
    .grand-total-block {
      background: var(--earth);
      color: #fff;
      border-radius: 8px;
      padding: 1.5rem 1.8rem;
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem
    }

    .gt-label {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: .3rem
    }

    .gt-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold)
    }

    .gt-breakdown {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      font-size: .75rem;
      opacity: .8
    }

    .gt-breakdown span {
      display: flex;
      justify-content: space-between;
      gap: 2rem
    }

    .gt-breakdown strong {
      color: #fff
    }

    /* Budget vs actuals */
    .comparison {
      background: #fff;
      border: 1px solid #D0C8BC;
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      margin-top: 1.5rem
    }

    .comparison h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: .9rem;
      color: var(--earth)
    }

    .comp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #EEE8E0;
      font-size: .78rem
    }

    .comp-row:last-child {
      border-bottom: none;
      padding-top: 8px;
      font-weight: 700;
      font-size: .85rem
    }

    .comp-label {
      color: var(--stone)
    }

    .comp-val {
      font-variant-numeric: tabular-nums
    }

    .comp-val.under {
      color: var(--fern)
    }

    .comp-val.over {
      color: #C0392B
    }

    .comp-val.neutral {
      color: var(--earth)
    }

    /* Payment tags */
    .pay-tag {
      display: inline-block;
      font-size: .63rem;
      padding: .1rem .45rem;
      border-radius: 3px;
      background: #F0F0F0;
      color: var(--stone);
      margin-top: .2rem
    }

    .footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--stone);
      font-size: .7rem;
      color: var(--stone);
      line-height: 2
    }

    .footer::after {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 1.2rem auto 0
    }

    @media(max-width:520px) {
      .receipt-header {
        flex-direction: column;
        align-items: flex-start
      }

      .grand-total-block {
        flex-direction: column
      }
    }
  </style>
</head>

  <div class="page">

    <header class="header">
      <p class="report-label">Trip Food Expense Report</p>
      <h1>Spring Prep Hike — April 4–6, 2026</h1>
    </header>

    <!-- Summary cards — populated from Google Sheets -->
    <div class="summary-grid" id="summary-grid"></div>

    <!-- Receipts — populated from Google Sheets -->
    <div id="receipts-container"></div>

    <!-- Grand total — populated from Google Sheets -->
    <div class="grand-total-block" id="grand-total-block"></div>

    <!-- Budget comparison — populated from Google Sheets -->
    <div class="comparison">
      <h3>Budget vs. Actual</h3>
      <div id="comparison-rows"></div>
    </div>

    <footer class="footer">
      <p>Spring Prep Hike &nbsp;·&nbsp; April 4–6, 2026 &nbsp;·&nbsp; Food Expense Report</p>
    </footer>

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // GOOGLE SHEETS CONFIG
    // After uploading the CSV files to Google Sheets and publishing each tab,
    // paste the "Publish to web" CSV URL for each tab below.
    //
    // How to get each URL:
    //   1. Open the spreadsheet → File → Share → Publish to web
    //   2. Select the tab name, choose "Comma-separated values (.csv)", click Publish
    //   3. Copy the URL and paste it in the matching slot below
    // ─────────────────────────────────────────────────────────────────────────
    const SHEETS = {
      summary:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=1279979925&single=true&output=csv',
      orders:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=115109068&single=true&output=csv',
      items:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=1201278118&single=true&output=csv',
      footer:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=119295505&single=true&output=csv',
      breakdown:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=153888869&single=true&output=csv',
      comparison: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0aUkEqqx2KFwH_28uXlzSTcnddjFZmQm6x2KO1PdxZMf_o3tciNtj3TuOeob7nVnxSA_wt_eal1oY/pub?gid=880117868&single=true&output=csv',
    };

    // ── CSV parser (handles quoted fields with commas / newlines) ────────────
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], next = text[i + 1];
        if (inQ) {
          if (c === '"' && next === '"') { field += '"'; i++; }
          else if (c === '"') { inQ = false; }
          else { field += c; }
        } else {
          if (c === '"') { inQ = true; }
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\r' && next === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; }
          else if (c === '\n' || c === '\r') { row.push(field); rows.push(row); row = []; field = ''; }
          else { field += c; }
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      if (!rows.length) return [];
      const headers = rows[0];
      return rows.slice(1).filter(r => r.some(v => v.trim())).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h.trim()] = (r[i] || '').trim(); });
        return obj;
      });
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function fmt(n) {
      return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Renderers (unchanged logic) ──────────────────────────────────────────
    function renderSummary(s) {
      document.getElementById('summary-grid').innerHTML = `
        <div class="card"><p class="card-label">Total Spent</p><p class="card-value big">${fmt(s.totalSpent)}</p><p class="card-sub">${s.orders} orders</p></div>
        <div class="card"><p class="card-label">Per Person</p><p class="card-value">${fmt(s.perPerson)}</p><p class="card-sub">${s.participants} participants</p></div>
        <div class="card"><p class="card-label">Budget</p><p class="card-value">${fmt(s.estimatedBudget)}</p><p class="card-sub">estimated</p></div>
        <div class="card"><p class="card-label">Over Budget</p><p class="card-value" style="color:#C0392B">${fmt(s.overBudget)}</p><p class="card-sub">${s.overBudgetPct}% above</p></div>
        <div class="card"><p class="card-label">Discounts Saved</p><p class="card-value" style="color:var(--fern)">${fmt(s.discountsSaved)}</p><p class="card-sub">across all orders</p></div>
      `;
    }

    function renderReceipt(o) {
      const detail = o.storeDetail
        ? ` <span style="font-size:.72rem;font-weight:300;color:var(--stone)">${esc(o.storeDetail)}</span>` : '';
      const metaParts = [o.date, o.orderNum, o.orderMeta].filter(Boolean).map(esc);
      const unitHeader = esc(o.unitHeader || 'Unit');
      const totalHeader = esc(o.totalHeader || 'Total');

      const rows = o.items.map(item => {
        const badge = item.badge
          ? `<span class="badge ${item.badge}">${esc(item.category)}</span>` : '';
        const nameNote = item.nameNote
          ? `&nbsp;<span class="td note">${esc(item.nameNote)}</span>` : '';
        const unitVal = isNaN(Number(item.unit)) ? esc(item.unit) : fmt(item.unit);
        return `<tr>
          <td class="item-name">${esc(item.name)}${nameNote}</td>
          <td>${badge}</td>
          <td class="r">${esc(String(item.qty))}</td>
          <td class="r">${unitVal}</td>
          <td class="r">${fmt(item.total)}</td>
        </tr>`;
      }).join('');

      const footerRows = o.footer.map(f =>
        `<div class="footer-row ${f.class}"><span>${esc(f.label)}</span><span>${esc(f.value)}</span></div>`
      ).join('');

      const note = o.note ? `<div class="receipt-note">${esc(o.note)}</div>` : '';

      return `<div class="receipt">
        <div class="receipt-header ${o.headerClass}">
          <div>
            <p class="store-name">${esc(o.store)}${detail}</p>
            <p class="store-meta">${metaParts.join(' &nbsp;·&nbsp; ')} &nbsp;·&nbsp; <span class="pay-tag">${esc(o.payment)}</span></p>
          </div>
          <span class="receipt-total">${fmt(o.total)}</span>
        </div>
        <table>
          <thead><tr>
            <th>Item</th><th>Category</th>
            <th class="r">Qty</th><th class="r">${unitHeader}</th><th class="r">${totalHeader}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${note}
        <div class="receipt-footer">${footerRows}</div>
      </div>`;
    }

    function renderGrandTotal(summary, breakdown) {
      const rows = breakdown.map(r =>
        `<span><span>${esc(r.label)}</span><strong>${fmt(r.amount)}</strong></span>`
      ).join('');
      document.getElementById('grand-total-block').innerHTML = `
        <div>
          <p class="gt-label">Total Expenditure</p>
          <p class="gt-value">${fmt(summary.totalSpent)}</p>
        </div>
        <div class="gt-breakdown">${rows}</div>`;
    }

    function renderComparison(rows) {
      document.getElementById('comparison-rows').innerHTML = rows.map(r => {
        const label = r.bold ? `<strong>${esc(r.label)}</strong>` : esc(r.label);
        const val   = r.bold ? `<strong>${esc(r.value)}</strong>` : esc(r.value);
        return `<div class="comp-row">
          <span class="comp-label">${label}</span>
          <span class="comp-val ${r.class}">${val}</span>
        </div>`;
      }).join('');
    }

    // ── Assemble data from 6 CSVs and render ─────────────────────────────────
    function showError(msg) {
      document.getElementById('receipts-container').innerHTML =
        `<p style="color:#8C4A2F;padding:1.5rem;background:#FFF0EE;border-radius:6px;margin:1rem 0">⚠ ${msg}</p>`;
    }

    const configured = Object.values(SHEETS).every(u => !u.startsWith('PASTE_'));

    if (!configured) {
      showError('Google Sheets URLs not yet configured. ' +
        'Open <code>Spring_Prep_Hike_Expenses.html</code>, find the <code>SHEETS</code> object at the top of the script, ' +
        'and paste the published CSV URL for each tab.');
    } else {
      Promise.all(Object.entries(SHEETS).map(([key, url]) =>
        fetch(url).then(r => { if (!r.ok) throw new Error(key); return r.text(); }).then(t => [key, t])
      ))
      .then(results => {
        const csv = Object.fromEntries(results.map(([k, t]) => [k, parseCSV(t)]));

        // Summary: key→value map
        const summary = {};
        csv.summary.forEach(r => { summary[r.key] = isNaN(r.value) ? r.value : Number(r.value); });

        // Orders: build order map, attach items/footer
        const orderMap = {};
        csv.orders.forEach(r => {
          orderMap[r.id] = {
            ...r,
            total: Number(r.total),
            items: [],
            footer: []
          };
        });
        csv.items.forEach(r => {
          if (orderMap[r.orderId]) orderMap[r.orderId].items.push({
            ...r,
            unit: isNaN(Number(r.unit)) ? r.unit : Number(r.unit),
            total: Number(r.total)
          });
        });
        csv.footer.forEach(r => {
          if (orderMap[r.orderId]) orderMap[r.orderId].footer.push({
            label: r.label, value: r.value, class: r.footerClass
          });
        });
        // Preserve original order
        const orders = csv.orders.map(r => orderMap[r.id]);

        // Breakdown & comparison
        const breakdown = csv.breakdown.map(r => ({ label: r.label, amount: Number(r.amount) }));
        const comparison = csv.comparison.map(r => ({ ...r, bold: r.bold === 'true' || r.bold === 'TRUE' }));

        renderSummary(summary);
        document.getElementById('receipts-container').innerHTML = orders.map(renderReceipt).join('');
        renderGrandTotal(summary, breakdown);
        renderComparison(comparison);
      })
      .catch(err => showError(`Could not load sheet: ${err.message}. Check that each tab is published to the web as CSV.`));
    }
  </script>
</body>
</html>
